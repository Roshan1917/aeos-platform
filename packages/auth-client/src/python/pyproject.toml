[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aeos-auth-client"
version = "0.1.0"
description = "AEOS JWT middleware, RBAC check, and agent identity for FastAPI"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111.0",
    "PyJWT[cryptography]>=2.8.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "pytest-httpx>=0.30.0"]

[tool.hatch.build.targets.wheel]
packages = ["aeos_auth_client"]
