[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aeos-registry-client"
version = "0.1.0"
description = "AEOS UoP, Process, and Agent registry clients"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio"]

[tool.hatch.build.targets.wheel]
packages = ["aeos_registry_client"]
