{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "telemetry.fullname" . }}
  labels:
    {{- include "telemetry.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Matches /api/telemetry and /api/telemetry/<path>; the rewrite-target
          # annotation strips the prefix before forwarding.
          - path: {{ printf "%s(/|$)(.*)" .Values.ingress.pathPrefix }}
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "telemetry.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
