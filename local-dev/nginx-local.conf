# Local-dev nginx for the apps/web container under `--profile services`.
# In production the platform ingress proxies /api/<svc>/* to each service;
# locally there is no ingress, so this config wires those paths directly to
# the in-compose service hostnames so the SPA can talk to its backends.
#
# Mounted at /etc/nginx/conf.d/default.conf — overrides the image default.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # API proxies — prefix locations with trailing slashes strip the
    # `/api/<svc>/` prefix when forwarding upstream. Static `proxy_pass`
    # targets so nginx resolves hostnames at start-up via Docker's
    # embedded DNS without needing a `resolver` directive (regex
    # locations would require runtime resolution).
    location /api/substrate/ {
        proxy_pass http://substrate:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/telemetry/ {
        proxy_pass http://telemetry:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/recommendations/ {
        proxy_pass http://recommendations:3004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/test-generator/ {
        proxy_pass http://test-generator:3005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE streams from /v1/runs/:id/events — disable buffering.
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    location /api/discovery/ {
        proxy_pass http://discovery:3006/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Document uploads — raise body size + timeouts.
        client_max_body_size 12m;
        proxy_read_timeout 5m;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
