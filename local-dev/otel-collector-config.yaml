extensions:
  # LangFuse uses HTTP Basic auth: public key = username, secret key = password
  basicauth/langfuse:
    client_auth:
      username: ${env:LANGFUSE_PUBLIC_KEY}
      password: ${env:LANGFUSE_SECRET_KEY}

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 50

exporters:
  otlphttp/langfuse:
    endpoint: http://langfuse:3000/api/public/otel
    auth:
      authenticator: basicauth/langfuse
  debug:
    verbosity: basic

service:
  extensions: [basicauth/langfuse]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/langfuse, debug]
