# LangFuse signing material — synced from AWS Secrets Manager via ExternalSecret.
#
# AWS layout (JSON) at `.Values.secret.awsName`:
#   {
#     "nextauth-secret":      "<openssl rand -base64 32>",
#     "salt":                 "<openssl rand -base64 32>",
#     "encryption-key":       "<openssl rand -hex 32>",
#     "postgresql-password":  "<openssl rand -hex 24>",   # URL-safe — `-base64` breaks Prisma
#     "redis-password":       "<openssl rand -hex 24>",
#     "clickhouse-password":  "<openssl rand -hex 24>",
#     "minio-root-user":      "minio",
#     "minio-root-password":  "<openssl rand -hex 24>",
#     "telemetry-public-key": "pk-lf-...",
#     "telemetry-secret-key": "sk-lf-..."
#   }
#
# The ExternalSecret writes a single k8s Secret (`langfuse-env`) consumed by
# the bundled langfuse-web + langfuse-worker pods AND by the bundled
# Postgres + Redis + ClickHouse + MinIO subcharts via their `existingSecret`
# fields in values.yaml. A second ExternalSecret pulls the OTel API keys
# into `langfuse-otel-credentials` for the OTel Collector exporter in the
# observability chart.
{{- if .Values.secret.awsName }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secret.k8sName }}
  namespace: observability
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: aeos-platform
    app.kubernetes.io/component: langfuse
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.clusterSecretStore.name }}
  target:
    name: {{ .Values.secret.k8sName }}
    creationPolicy: Owner
  data:
    - secretKey: nextauth-secret
      remoteRef:
        key: {{ .Values.secret.awsName }}
        property: nextauth-secret
    - secretKey: salt
      remoteRef:
        key: {{ .Values.secret.awsName }}
        property: salt
    - secretKey: encryption-key
      remoteRef:
        key: {{ .Values.secret.awsName }}
        property: encryption-key
    - secretKey: postgresql-password
      remoteRef:
        key: {{ .Values.secret.awsName }}
        property: postgresql-password
    - secretKey: redis-password
      remoteRef:
        key: {{ .Values.secret.awsName }}
        property: redis-password
    - secretKey: clickhouse-password
      remoteRef:
        key: {{ .Values.secret.awsName }}
        property: clickhouse-password
    - secretKey: minio-root-user
      remoteRef:
        key: {{ .Values.secret.awsName }}
        property: minio-root-user
    - secretKey: minio-root-password
      remoteRef:
        key: {{ .Values.secret.awsName }}
        property: minio-root-password
---
# Second secret for the OTel Collector exporter — same source secret in
# AWS, different k8s secret name to match the wiring already referenced
# by aeos-observability/values.yaml (`langfuse.secretName`).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langfuse-otel-credentials
  namespace: observability
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: aeos-platform
    app.kubernetes.io/component: langfuse
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.clusterSecretStore.name }}
  target:
    name: langfuse-otel-credentials
    creationPolicy: Owner
  data:
    - secretKey: public-key
      remoteRef:
        key: {{ .Values.secret.awsName }}
        property: telemetry-public-key
    - secretKey: secret-key
      remoteRef:
        key: {{ .Values.secret.awsName }}
        property: telemetry-secret-key
{{- end }}
