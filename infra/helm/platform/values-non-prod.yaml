# Non-prod environment overrides for aeos-platform umbrella chart.
# Applied on top of values.yaml for dev + staging.

cloudflare:
  secrets:
    apiTokenSecretName: aeos/non-prod/platform/cloudflare-api-token
    originCertSecretName: aeos/non-prod/platform/cloudflare-origin-cert

ingress-nginx:
  controller:
    replicaCount: 1
    extraArgs:
      # Use the Cloudflare Origin CA cert (synced via ExternalSecret) as the
      # default TLS cert for every Ingress that does not specify its own.
      default-ssl-certificate: "ingress-nginx/cloudflare-origin-tls"
    config:
      # Trust Cloudflare's published IP ranges so X-Forwarded-For is honored.
      proxy-real-ip-cidr: |-
        173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32
    resources:
      limits:
        cpu: 250m
        memory: 256Mi

cert-manager:
  replicaCount: 1

external-secrets:
  replicaCount: 1
  serviceAccount:
    annotations:
      # IRSA — must match output `external_secrets_role_arn` from terraform non-prod env.
      # `NON_PROD_ACCOUNT_ID` is substituted by CI (helm --set) or via envsubst at deploy.
      eks.amazonaws.com/role-arn: "arn:aws:iam::NON_PROD_ACCOUNT_ID:role/aeos-non-prod-external-secrets"

external-dns:
  txtOwnerId: aeos-non-prod
  domainFilters:
    - aeos.fuzebox.ai

argocdIngress:
  # Flat one-label-deep so the existing *.aeos.fuzebox.ai Origin CA cert covers it.
  host: staging-argocd.aeos.fuzebox.ai

clusterIssuer:
  staging:
    enabled: false
  production:
    enabled: false

clusterSecretStore:
  region: us-east-1
