apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aeos-langfuse
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: aeos-platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/fuzebox-ai/aeos-platform.git
    targetRevision: HEAD
    path: infra/helm/langfuse
    helm:
      # Pin the Helm release name so the upstream subchart's Service names
      # are deterministic (`langfuse-web`, `langfuse-worker`) — the public
      # Ingress in aeos-observability targets `langfuse-web:3000` by name.
      releaseName: langfuse
      valueFiles:
        - values.yaml
        - values-non-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
