# Cloudflare secrets — synced from AWS Secrets Manager via ExternalSecret.
#
# Two secrets are pulled:
#   1. cloudflare-api-token  → k8s secret in `external-dns` ns → external-dns CF_API_TOKEN
#   2. cloudflare-origin-tls → kubernetes.io/tls in `ingress-nginx` ns → default-ssl-certificate
#
# Both Secrets Manager entries are provisioned (empty) by Terraform; values
# are populated manually post-apply via AWS console or CLI.
#
# AWS layout (JSON):
#   aeos/{env}/platform/cloudflare-api-token
#       { "api-token": "<CF Origin DNS Edit token scoped to the zone>" }
#
#   aeos/{env}/platform/cloudflare-origin-cert
#       { "tls.crt": "<PEM>", "tls.key": "<PEM>" }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: aeos-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.clusterSecretStore.name }}
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: {{ .Values.cloudflare.secrets.apiTokenSecretName }}
        property: api-token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-origin-tls
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: aeos-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.clusterSecretStore.name }}
  target:
    name: cloudflare-origin-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ `{{ .crt }}` }}"
        tls.key: "{{ `{{ .key }}` }}"
  data:
    - secretKey: crt
      remoteRef:
        key: {{ .Values.cloudflare.secrets.originCertSecretName }}
        property: tls.crt
    - secretKey: key
      remoteRef:
        key: {{ .Values.cloudflare.secrets.originCertSecretName }}
        property: tls.key
