# external-secrets ClusterSecretStore — AWS Secrets Manager backend.
# All ExternalSecret resources in the cluster reference this store by name.
# IRSA provides the IAM credentials; no static keys are stored in the cluster.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.clusterSecretStore.name }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: aeos-platform
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.clusterSecretStore.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.clusterSecretStore.serviceAccountRef }}
            # external-secrets is cluster-scoped; the SA lives in its own namespace
            namespace: platform
