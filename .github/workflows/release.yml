name: Release (changesets)

# Changesets has two pieces:
#   1. Changeset Bot — a GitHub App installed at org level
#      (https://github.com/apps/changeset-bot). It comments on PRs from
#      outside this workflow; nothing to invoke here.
#   2. changesets/action — the publish/version action, used below.
#
# The "Changeset Bot" workflow job that previously lived here tried to
# `uses: changesets/bot@v1`, which is not a real action and always
# failed. Removed.

on:
  push:
    branches: [main]

jobs:
  release:
    name: Release — Version Packages or Publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@aeos'

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages
        run: pnpm --filter './packages/**' build

      - name: Create Version PR or Publish to npm (GitHub Packages)
        uses: changesets/action@v1
        with:
          # If changesets are pending: opens / updates a "Version Packages" PR.
          # If "Version Packages" PR was just merged: runs `pnpm release`.
          publish: pnpm release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
