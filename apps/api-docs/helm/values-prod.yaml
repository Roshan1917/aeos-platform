replicaCount: 2
image:
  repository: 647379406699.dkr.ecr.us-east-1.amazonaws.com/aeos-api-docs
  tag: "latest"
ingress:
  enabled: true
  className: nginx
  annotations:
    external-dns.alpha.kubernetes.io/hostname: api-docs.aeos.fuzebox.ai
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
  hosts:
    - host: api-docs.aeos.fuzebox.ai
      paths:
        - path: /
          pathType: Prefix
  backends:
    substrate:        { service: substrate,        port: 80 }
    telemetry:        { service: telemetry,        port: 80 }
    recommendations:  { service: recommendations,  port: 80 }
    discovery:        { service: discovery,        port: 80 }
    test-generator:   { service: test-generator,   port: 80 }
