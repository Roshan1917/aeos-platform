server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck for k8s probes
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # API paths are proxied by the platform ingress in non-local envs.
    # In standalone mode the operator must front this image with a reverse
    # proxy that exposes /api/substrate, /api/telemetry, /api/recommendations.

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Cache static assets aggressively
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
